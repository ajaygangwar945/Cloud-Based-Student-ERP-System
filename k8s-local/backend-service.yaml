# Kubernetes Service API Version
apiVersion: v1
# Expose the Backend application pods as a network service
kind: Service
metadata:
  # Unique name for the backend service in the cluster namespace
  name: backend
spec:
  # Route network traffic to any pod matching the label 'app: backend'
  selector:
    app: backend
  ports:
    # Port configuration mapping external access to internal pod ports
    - protocol: TCP
      # Exposed port inside the Kubernetes cluster network
      port: 5000
      # Target port on the container itself where Node.js/Express is listening
      targetPort: 5000
      # External static port exposed on every virtual node for browser/client access
      nodePort: 30001
  # NodePort service type exposes the port externally on node public IPs
  type: NodePort
